<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Backprop — Graphviz Edge Routing</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
window.MathJax = { tex: { inlineMath: [['$', '$']] }, startup: { typeset: false } };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<style>body { font-family: system-ui, sans-serif; margin: 20px; }</style>
</head>
<body>
<div style="background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px 20px;">

<b>Interactive backpropagation tree.</b>
<span style="color:#5b9bd5">Forward</span> (left) builds the product tree;
<span style="color:#7b2d8e">backward</span> (right) propagates adjoints.
<span style="color:#999">Gray</span> edges show sibling forward polynomials feeding into each adjoint.
$\pi_i = w_i \cdot \bar{c}_1^{(i)}$.
Drag weight sliders to explore.

<div id="bp"></div>

<script type="module">
import { Graphviz } from "https://cdn.jsdelivr.net/npm/@hpcc-js/wasm-graphviz@1.6.1/dist/index.js";
const gv = await Graphviz.load();

const N0=4, n0=2, w0=[0.5,1.2,0.3,1.0], WMAX=3;
const CW='#5b9bd5', CA='#7b2d8e', CI='#d4a24e', CR='#c0504d';
const bW=28, bH=70, bGap=4, nPad=12, slH=70;
let N=N0, n=n0, w=[...w0];

function polyMul(a,b){let o=Array(a.length+b.length-1).fill(0);for(let i=0;i<a.length;i++)for(let j=0;j<b.length;j++)o[i+j]+=a[i]*b[j];return o;}
function buildTree(w,n){
  let lv=w.map((wi,i)=>({poly:[1,wi],leaf:true,idx:i}));
  let sz=1;while(sz<lv.length)sz*=2;while(lv.length<sz)lv.push({poly:[1],pad:true});
  let level=lv,all=[level];
  while(level.length>1){let nx=[];for(let i=0;i<level.length;i+=2){let p=polyMul(level[i].poly,level[i+1].poly);if(p.length>n+1)p=p.slice(0,n+1);nx.push({left:level[i],right:level[i+1],poly:p});}level=nx;all.push(level);}
  return{root:level[0],levels:all};
}
function crossCorr(pa,sp,ml){let o=Array(ml).fill(0);for(let j=0;j<ml;j++)for(let k=0;k<sp.length;k++)if(j+k<pa.length)o[j]+=pa[j+k]*sp[k];return o;}
function doBackprop(tree,n){
  let rt=tree.root,Z=rt.poly[Math.min(n,rt.poly.length-1)]||0;
  let al=Math.min(rt.poly.length,n+1);rt.adj=Array(al).fill(0);
  if(n<al&&Z>0)rt.adj[n]=1/Z;
  (function walk(nd){if(!nd.left)return;nd.left.adj=crossCorr(nd.adj,nd.right.poly,Math.min(nd.left.poly.length,n+1));nd.right.adj=crossCorr(nd.adj,nd.left.poly,Math.min(nd.right.poly.length,n+1));walk(nd.left);walk(nd.right);})(rt);
  return Z;
}
function fmt(v){return v===0?'0':Math.abs(v)<.005?'':Math.abs(v)>=10?v.toFixed(0):Math.abs(v)>=1?v.toFixed(1):v.toFixed(2);}
function bxW(nd,mode){let c=mode==='f'?nd.poly:(nd.adj||[]);return Math.min(c.length,n+1)*(bW+bGap)-bGap+nPad;}

const PPI = 72; // graphviz points per inch
const px2in = px => px / PPI;
const root = d3.select('#bp');

function fullBuild() {
  root.selectAll('*').remove();

  // Controls
  let ctrl = root.append('div').style('display','flex').style('align-items','center')
    .style('gap','12px').style('margin-bottom','8px').style('font-size','0.9em');
  ctrl.append('span').html('$N$ = ');
  ctrl.append('input').attr('type','number').attr('min',2).attr('value',N).style('width','44px')
    .on('change',function(){let v=Math.max(2,+this.value);if(v===N)return;while(w.length<v)w.push(.5+Math.random());w=w.slice(0,v);N=v;n=Math.min(n,N);fullBuild();});
  ctrl.append('span').html('&ensp;$n$ = ');
  ctrl.append('input').attr('type','number').attr('min',0).attr('max',N).attr('value',n).style('width','44px')
    .on('change',function(){let v=Math.max(0,Math.min(N,+this.value));if(v===n)return;n=v;fullBuild();});

  let tree = buildTree(w, n), Z = doBackprop(tree, n);
  let levels = tree.levels, depth = levels.length;
  let nodeH = bH + nPad;

  // Assign IDs and pixel positions (our layout)
  let leafSp = 0;
  levels[0].forEach(nd => {
    if(nd.pad) return;
    let ww = Math.max(bxW(nd,'f'), bxW(nd,'a')) + 20;
    if(ww > leafSp) leafSp = ww;
  });
  leafSp = Math.max(leafSp, 60);

  let totalLeaves = levels[0].length;
  let panelW = totalLeaves * leafSp + 40;
  let gap = 160;
  let topY = 30;
  let vStep = nodeH + 40;

  let nid = 0;
  for(let li=0; li<depth; li++) levels[li].forEach(nd => {
    nd.fid = 'f'+nid; nd.aid = 'a'+nid; nid++;
  });
  // Forward panel: left side
  for(let i=0; i<totalLeaves; i++){
    levels[0][i].fx = 20 + i*leafSp + leafSp/2;
    levels[0][i].fy = topY;
  }
  for(let li=1; li<depth; li++) levels[li].forEach(nd => {
    nd.fx = (nd.left.fx + (nd.right?nd.right.fx:nd.left.fx)) / 2;
    nd.fy = topY + li * vStep;
  });
  // Backward panel: right side
  for(let i=0; i<totalLeaves; i++){
    levels[0][i].ax = panelW + gap + 20 + i*leafSp + leafSp/2;
    levels[0][i].ay = topY;
  }
  for(let li=1; li<depth; li++) levels[li].forEach(nd => {
    nd.ax = (nd.left.ax + (nd.right?nd.right.ax:nd.left.ax)) / 2;
    nd.ay = topY + li * vStep;
  });

  // Build DOT with pinned positions (in inches) for neato -n2
  let dot = ['digraph G {', '  splines=ortho;', '  overlap=false;'];

  for(let li=0; li<depth; li++) levels[li].forEach(nd => {
    if(nd.pad) return;
    let fw_in = px2in(bxW(nd,'f')), fh_in = px2in(nodeH);
    let aw_in = px2in(bxW(nd,'a')), ah_in = px2in(nodeH);
    // Graphviz y is bottom-up, so negate y
    dot.push(`  ${nd.fid} [pos="${px2in(nd.fx)},${px2in(-nd.fy)}!", width=${fw_in.toFixed(3)}, height=${fh_in.toFixed(3)}, shape=box, label=""];`);
    dot.push(`  ${nd.aid} [pos="${px2in(nd.ax)},${px2in(-nd.ay)}!", width=${aw_in.toFixed(3)}, height=${ah_in.toFixed(3)}, shape=box, label=""];`);
  });

  // Forward edges
  for(let li=1; li<depth; li++) levels[li].forEach(nd => {
    if(nd.left && !nd.left.pad) dot.push(`  ${nd.left.fid} -> ${nd.fid} [color="#cccccc"];`);
    if(nd.right && !nd.right.pad) dot.push(`  ${nd.right.fid} -> ${nd.fid} [color="#cccccc"];`);
  });
  // Backward edges
  for(let li=1; li<depth; li++) levels[li].forEach(nd => {
    if(nd.left && !nd.left.pad) dot.push(`  ${nd.aid} -> ${nd.left.aid} [color="${CA}", style=dashed];`);
    if(nd.right && !nd.right.pad) dot.push(`  ${nd.aid} -> ${nd.right.aid} [color="${CA}", style=dashed];`);
  });
  // Cross-connections
  for(let li=1; li<depth; li++) levels[li].forEach(nd => {
    if(!nd.left) return;
    [{ch:nd.left, sib:nd.right}, {ch:nd.right, sib:nd.left}].forEach(({ch, sib}) => {
      if(!ch||ch.pad||!sib||sib.pad) return;
      dot.push(`  ${sib.fid} -> ${ch.aid} [color="#999999", style=dotted, constraint=false];`);
    });
  });

  dot.push('}');

  // Run Graphviz neato with pinned positions
  let jsonStr;
  try {
    jsonStr = gv.neato(dot.join('\n'), 'json', ['-n2']);
  } catch(e) {
    root.append('div').text('Graphviz error: ' + e.message);
    return;
  }
  let layout = JSON.parse(jsonStr);
  let bb = layout.bb.split(',').map(Number);
  let gvH = bb[3]; // for y-flip

  let svgW = bb[2] + 20, svgH = bb[3] + 20;
  let svgWrap = root.append('div').style('position','relative').style('width',svgW+'px').style('height',svgH+'px');
  let svg = svgWrap.append('svg').attr('width',svgW).attr('height',svgH).style('display','block');

  // Draw edges from Graphviz output
  (layout.edges||[]).forEach(edge => {
    let style = edge.style || 'solid';
    let color = edge.color || '#999';
    let dash = style==='dotted'?'2,3':style==='dashed'?'5,3':'none';
    let sw = style==='dotted'?1:style==='dashed'?1.2:1.5;
    let opacity = style==='dotted'?0.5:style==='dashed'?0.6:1;

    (edge._draw_||[]).forEach(cmd => {
      if(cmd.op==='b'||cmd.op==='B') {
        let pts = cmd.points;
        let d = 'M'+pts[0][0]+','+(gvH-pts[0][1]);
        for(let i=1; i<pts.length; i+=3) {
          if(i+2<pts.length)
            d += ' C'+pts[i][0]+','+(gvH-pts[i][1])+' '+pts[i+1][0]+','+(gvH-pts[i+1][1])+' '+pts[i+2][0]+','+(gvH-pts[i+2][1]);
        }
        svg.append('path').attr('d',d).attr('fill','none')
          .attr('stroke',color).attr('stroke-width',sw)
          .attr('stroke-dasharray',dash).attr('opacity',opacity);
      }
    });
    // Arrowhead
    (edge._hdraw_||[]).forEach(cmd => {
      if(cmd.op==='P'||cmd.op==='p') {
        let pts = cmd.points.map(p => [p[0], gvH-p[1]]);
        svg.append('polygon').attr('points',pts.map(p=>p.join(',')).join(' '))
          .attr('fill',color).attr('opacity',opacity);
      }
    });
  });

  // Get actual rendered node positions from Graphviz
  let gvPos = {};
  (layout.objects||[]).forEach(obj => {
    if(obj.name && obj.pos) {
      let [x,y] = obj.pos.split(',').map(Number);
      gvPos[obj.name] = {x, y: gvH - y};
    }
  });

  // Draw histogram bars at Graphviz node positions
  let logMaxFwd = Math.log1p(Math.pow(WMAX, n)), logMaxAdj = Math.log1p(1);
  let fwdRefs=[], adjRefs=[];

  function drawBars(nd, mode) {
    let id = mode==='f'?nd.fid:nd.aid;
    let pos = gvPos[id];
    if(!pos) return null;
    let coeffs = mode==='f'?nd.poly:(nd.adj||[]);
    let nc = Math.min(coeffs.length, n+1);
    if(!nc) return null;
    let color = mode==='f'?CW:CA, logMax = mode==='f'?logMaxFwd:logMaxAdj;
    let boxWidth = nc*(bW+bGap)-bGap+nPad;
    let gx = pos.x - boxWidth/2, gy = pos.y - nodeH/2;
    let g = svg.append('g').attr('transform',`translate(${gx},${gy})`);
    g.append('rect').attr('width',boxWidth).attr('height',nodeH).attr('fill','#f9f9f9').attr('rx',5).attr('stroke','#eee');
    let rects=[], texts=[];
    for(let k=0;k<nc;k++){
      let bx=nPad/2+k*(bW+bGap), v=k<coeffs.length?coeffs[k]:0;
      let fr=Math.min(1,Math.log1p(Math.abs(v))/logMax);
      let px=Math.max(.5,fr*(bH-12));
      let isHL=(mode==='f'&&nd===levels[depth-1][0]&&k===n);
      let c=isHL?CR:color;
      rects.push(g.append('rect').attr('x',bx+1).attr('width',bW-2).attr('rx',2)
        .attr('y',nPad/2+(bH-12)-px).attr('height',px).attr('fill',c).attr('opacity',.7));
      texts.push(g.append('text').attr('x',bx+bW/2).attr('y',nPad/2+(bH-12)-px-3)
        .attr('text-anchor','middle').style('font-size','8px').style('fill',c).text(fmt(v)));
    }
    return {rects,texts,nc};
  }

  for(let li=0;li<depth;li++) levels[li].forEach(nd => {
    if(nd.pad){fwdRefs.push(null);adjRefs.push(null);return;}
    fwdRefs.push(drawBars(nd,'f'));
    adjRefs.push(drawBars(nd,'a'));
  });

  // Weight sliders and pi bars
  levels[0].forEach((nd,idx) => {
    if(nd.pad) return;
    let fpos = gvPos[nd.fid], apos = gvPos[nd.aid];
    if(!fpos || !apos) return;

    // Weight slider
    let slTop = fpos.y - nodeH/2 - slH - 16;
    let frac = Math.min(w[idx]/WMAX, 1);
    svg.append('rect').attr('x',fpos.x-bW/2+2).attr('width',bW-4).attr('rx',2)
      .attr('y',slTop+slH-frac*slH).attr('height',frac*slH).attr('fill',CI).attr('opacity',.8).style('pointer-events','none');
    svg.append('text').attr('x',fpos.x).attr('y',slTop+slH-frac*slH-2)
      .attr('text-anchor','middle').style('font-size','9px').style('fill',CI).text(w[idx].toFixed(2));
    svgWrap.append('div').style('position','absolute').style('left',fpos.x+'px').style('top',(slTop+slH)+'px')
      .style('transform','translateX(-50%)').style('font-size','13px').style('color',CI).style('pointer-events','none')
      .html('$w_{'+(idx+1)+'}$');
    svg.append('line').attr('x1',fpos.x).attr('y1',slTop+slH+14).attr('x2',fpos.x).attr('y2',fpos.y-nodeH/2)
      .attr('stroke','#ccc').attr('stroke-width',1);
    svg.append('rect').attr('x',fpos.x-bW/2-4).attr('y',slTop-2).attr('width',bW+8).attr('height',slH+4)
      .attr('fill','transparent').attr('cursor','ns-resize').style('touch-action','none')
      .call(d3.drag().on('drag', event => {
        let fr=(slTop+slH-event.y)/slH;
        w[idx]=Math.max(.01,Math.min(WMAX,fr*WMAX));
        fullBuild();
      }));

    // Pi bar
    let piTop = apos.y - nodeH/2 - slH - 16;
    let pi_i = nd.adj&&nd.adj.length>1?w[idx]*nd.adj[1]:0;
    let pf = Math.min(pi_i, 1);
    svg.append('rect').attr('x',apos.x-bW/2+2).attr('width',bW-4).attr('rx',2)
      .attr('y',piTop+slH-pf*slH).attr('height',pf*slH).attr('fill',CR).attr('opacity',.7);
    svg.append('text').attr('x',apos.x).attr('y',piTop+slH-pf*slH-2)
      .attr('text-anchor','middle').style('font-size','9px').style('fill',CR).text(pi_i.toFixed(3));
    svgWrap.append('div').style('position','absolute').style('left',apos.x+'px').style('top',(piTop+slH)+'px')
      .style('transform','translateX(-50%)').style('font-size','13px').style('color',CR).style('pointer-events','none')
      .html('$\\pi_{'+(idx+1)+'}$');
    svg.append('line').attr('x1',apos.x).attr('y1',apos.y-nodeH/2).attr('x2',apos.x).attr('y2',piTop+slH+14)
      .attr('stroke','#d4a0a0').attr('stroke-width',1);
  });

  // Seed label
  let rn = gvPos[levels[depth-1][0].aid];
  if(rn) svgWrap.append('div').style('position','absolute').style('left',rn.x+'px').style('top',(rn.y-nodeH/2-16)+'px')
    .style('transform','translateX(-50%)').style('font-size','10px').style('color',CR).style('pointer-events','none')
    .html('$\\bar{c}_n = 1/Z$');

  setTimeout(()=>{if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise();},200);
}

fullBuild();
</script>
</div>
</body>
</html>
