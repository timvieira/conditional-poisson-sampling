<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Backprop Visualization — Side-by-Side Prototype</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
window.MathJax = {
  tex: { inlineMath: [['$', '$']] },
  startup: { typeset: false }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<style>
body { font-family: system-ui, sans-serif; margin: 20px; }
</style>
</head>
<body>

<div style="background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px 20px; margin: 16px 0; width: fit-content; min-width: 100%; max-width: none;">

<b>Interactive backpropagation tree (side-by-side prototype).</b>
The <span style="color:#5b9bd5">forward pass</span> (left) computes the polynomial product tree bottom-up.
The <span style="color:#7b2d8e">backward pass</span> (right) propagates adjoints top-down.
At the leaves, $\pi_i = w_i \cdot \bar{c}_1^{(i)}$.
Drag the weight sliders to explore.

<div id="bp"></div>
<script>
(function() {
  var N = 4, n = 2;
  var w = [0.5, 1.2, 0.3, 1.0];
  var WMAX = 3;

  var CW = '#5b9bd5', CR = '#c0504d', CI = '#d4a24e', CA = '#7b2d8e';
  var root = d3.select('#bp');

  function polyMul(a, b) {
    var out = new Array(a.length + b.length - 1).fill(0);
    for (var i = 0; i < a.length; i++)
      for (var j = 0; j < b.length; j++)
        out[i+j] += a[i] * b[j];
    return out;
  }

  function buildTree(w, n) {
    var leaves = w.map(function(wi, i) {
      return { poly: [1, wi], items: [i], leaf: true };
    });
    var size = 1;
    while (size < leaves.length) size *= 2;
    while (leaves.length < size)
      leaves.push({ poly: [1], items: [], leaf: true, pad: true });
    var level = leaves;
    var allLevels = [level];
    while (level.length > 1) {
      var next = [];
      for (var i = 0; i < level.length; i += 2) {
        var l = level[i], r = level[i+1];
        var p = polyMul(l.poly, r.poly);
        if (p.length > n + 1) p = p.slice(0, n + 1);
        next.push({ left: l, right: r, poly: p, items: l.items.concat(r.items), leaf: false });
      }
      level = next;
      allLevels.push(level);
    }
    return { root: level[0], levels: allLevels };
  }

  function crossCorr(parentAdj, siblingPoly, maxLen) {
    var out = new Array(maxLen).fill(0);
    for (var j = 0; j < maxLen; j++)
      for (var k = 0; k < siblingPoly.length; k++)
        if (j + k < parentAdj.length)
          out[j] += parentAdj[j + k] * siblingPoly[k];
    return out;
  }

  function backprop(tree, n) {
    var rt = tree.root;
    var Z = rt.poly[Math.min(n, rt.poly.length - 1)] || 0;
    var adjLen = Math.min(rt.poly.length, n + 1);
    rt.adj = new Array(adjLen).fill(0);
    if (n < adjLen && Z > 0) rt.adj[n] = 1 / Z;
    (function walkDown(nd) {
      if (nd.leaf || !nd.left) return;
      var left = nd.left, right = nd.right;
      left.adj = crossCorr(nd.adj, right.poly, Math.min(left.poly.length, n + 1));
      right.adj = crossCorr(nd.adj, left.poly, Math.min(right.poly.length, n + 1));
      walkDown(left); walkDown(right);
    })(rt);
    return Z;
  }

  var bW = 28, bH = 70, bGap = 4, nodePad = 12, vGap = 30, hGap = 20, sliderH = 70;
  var mathLabels = [];

  function addMathLabel(container, x, y, html, opts) {
    opts = opts || {};
    var div = container.append('div')
      .style('position', 'absolute')
      .style('left', x + 'px').style('top', y + 'px')
      .style('font-size', opts.fontSize || '10px')
      .style('color', opts.color || '#999')
      .style('pointer-events', 'none')
      .style('white-space', 'nowrap');
    if (opts.anchor === 'middle') div.style('transform', 'translateX(-50%)');
    div.html(html);
    mathLabels.push(div);
    return div;
  }

  function fmtVal(v) {
    if (v === 0) return '0';
    if (Math.abs(v) < 0.005) return '';
    if (Math.abs(v) >= 10) return v.toFixed(0);
    if (Math.abs(v) >= 1) return v.toFixed(1);
    return v.toFixed(2);
  }

  // Shared state for updates
  var fwdState = {}, adjState = {};

  function build() {
    root.selectAll('*').remove();
    mathLabels = [];

    // Controls
    var ctrl = root.append('div').style('display','flex').style('align-items','center')
      .style('gap','12px').style('margin-bottom','8px').style('font-size','0.9em');
    ctrl.append('span').html('$N$ = ');
    ctrl.append('input').attr('type','number').attr('min',2).attr('value',N)
      .style('width','44px').style('padding','2px 4px').style('font-family','inherit')
      .style('font-size','inherit').style('border','1px solid #ccc').style('border-radius','3px')
      .on('change input', function() {
        var v = Math.max(2, Math.round(+this.value));
        if (v === N) return;
        while (w.length < v) w.push(0.5 + Math.random());
        w = w.slice(0, v); N = v; n = Math.min(n, N); build();
      });
    ctrl.append('span').html('&ensp;$n$ = ');
    ctrl.append('input').attr('type','number').attr('min',0).attr('max',N).attr('value',n)
      .style('width','44px').style('padding','2px 4px').style('font-family','inherit')
      .style('font-size','inherit').style('border','1px solid #ccc').style('border-radius','3px')
      .on('change input', function() {
        var v = Math.max(0, Math.min(N, Math.round(+this.value)));
        if (v === n) return; n = v; build();
      });

    var tree = buildTree(w, n);
    var Z = backprop(tree, n);
    var levels = tree.levels;
    var depth = levels.length;

    // Layout dimensions for one tree panel
    function nodeBoxW(nd, mode) {
      if (nd.pad) return 0;
      var coeffs = mode === 'fwd' ? nd.poly : (nd.adj || []);
      var nc = Math.min(coeffs.length, n + 1);
      return nc * (bW + bGap) - bGap + nodePad;
    }

    var leafCount = levels[0].filter(function(nd) { return !nd.pad; }).length;
    var leafSpacing = 0;
    levels[0].forEach(function(nd) {
      var ww = Math.max(nodeBoxW(nd, 'fwd'), nodeBoxW(nd, 'adj'));
      if (ww + hGap > leafSpacing) leafSpacing = ww + hGap;
    });
    leafSpacing = Math.max(leafSpacing, bW + hGap + 10);

    var totalLeafCount = levels[0].length;
    var panelW = totalLeafCount * leafSpacing + 40;
    var topPad = 10, labelH = 16, sepGap = 20, arrowLen = 14;
    var nodeH = bH + nodePad;
    var inputZoneBot = topPad + sliderH + labelH + 10;
    var sep1Y = inputZoneBot + sepGap / 2;
    var leafY = sep1Y + sepGap / 2 + arrowLen;
    var rootBot = leafY + (depth - 1) * (nodeH + vGap) + nodeH;
    var piBarH = 50;
    var sep2Y = rootBot + sepGap;
    var outputY = sep2Y + sepGap / 2 + arrowLen;
    var panelH = outputY + piBarH + 20;

    var gap = 30;
    var totalW = panelW * 2 + gap;

    // Overall container
    var wrap = root.append('div')
      .style('display', 'flex').style('gap', gap + 'px')
      .style('align-items', 'flex-start');

    // Render one panel
    function renderPanel(parentDiv, mode, title, color) {
      var panel = parentDiv.append('div')
        .style('position', 'relative')
        .style('width', panelW + 'px')
        .style('height', panelH + 'px');

      // Title
      panel.append('div')
        .style('text-align', 'center').style('font-weight', 'bold')
        .style('color', color).style('margin-bottom', '4px')
        .style('font-size', '13px')
        .text(title);

      var svg = panel.append('svg')
        .attr('width', panelW).attr('height', panelH)
        .style('display', 'block').style('user-select', 'none');

      var defs = svg.append('defs');
      defs.append('marker').attr('id', mode + 'Arrow').attr('viewBox','0 0 10 10')
        .attr('refX',10).attr('refY',5).attr('markerWidth',7).attr('markerHeight',7).attr('orient','auto')
        .append('path').attr('d','M0,0 L10,5 L0,10 Z').attr('fill', mode === 'fwd' ? '#ccc' : color);

      // Assign positions
      for (var ni = 0; ni < totalLeafCount; ni++) {
        levels[0][ni].x = 20 + ni * leafSpacing + leafSpacing / 2;
        levels[0][ni].y = leafY;
      }
      for (var li = 1; li < depth; li++) {
        levels[li].forEach(function(nd) {
          nd.x = (nd.left.x + (nd.right ? nd.right.x : nd.left.x)) / 2;
          nd.y = leafY + li * (nodeH + vGap);
        });
      }

      // Edges
      for (var li = 1; li < depth; li++) {
        levels[li].forEach(function(nd) {
          [nd.left, nd.right].forEach(function(child) {
            if (!child || child.pad) return;
            var x1 = nd.x, y1 = nd.y, x2 = child.x, y2 = child.y + nodeH;
            var my = (y1 + y2) / 2;
            if (mode === 'adj') {
              svg.append('path')
                .attr('d', 'M'+x1+','+y1+' C'+x1+','+my+' '+x2+','+my+' '+x2+','+y2)
                .attr('fill','none').attr('stroke', color).attr('stroke-width',1.2)
                .attr('stroke-dasharray','4,2').attr('opacity',0.5)
                .attr('marker-end','url(#'+mode+'Arrow)');
            } else {
              svg.append('line')
                .attr('x1', x2).attr('y1', y2).attr('x2', x1).attr('y2', y1)
                .attr('stroke', '#ddd').attr('stroke-width', 1.5);
            }
          });
        });
      }

      // Separators
      svg.append('line').attr('x1',10).attr('x2',panelW-10).attr('y1',sep1Y).attr('y2',sep1Y)
        .attr('stroke','#e0e0e0').attr('stroke-width',1).attr('stroke-dasharray','4,4');
      svg.append('line').attr('x1',10).attr('x2',panelW-10).attr('y1',sep2Y).attr('y2',sep2Y)
        .attr('stroke','#e0e0e0').attr('stroke-width',1).attr('stroke-dasharray','4,4');

      var logMax = mode === 'fwd' ? Math.log1p(Math.pow(WMAX, n)) : Math.log1p(1);
      var nodeRefs = [];

      // Draw bars at each node
      for (var li = 0; li < depth; li++) {
        levels[li].forEach(function(nd) {
          if (nd.pad) { nodeRefs.push(null); return; }
          var coeffs = mode === 'fwd' ? nd.poly : (nd.adj || []);
          var nCoeffs = Math.min(coeffs.length, n + 1);
          if (nCoeffs === 0) { nodeRefs.push(null); return; }
          var boxW = nCoeffs * (bW + bGap) - bGap + nodePad;
          var gx = nd.x - boxW / 2;

          var g = svg.append('g').attr('transform', 'translate(' + gx + ',' + nd.y + ')');
          g.append('rect').attr('width', boxW).attr('height', nodeH)
            .attr('fill', '#f9f9f9').attr('stroke', 'none').attr('rx', 5);

          var rects = [], texts = [];
          for (var k = 0; k < nCoeffs; k++) {
            var bx = nodePad / 2 + k * (bW + bGap);
            var val = k < coeffs.length ? coeffs[k] : 0;
            var frac = Math.min(1, Math.log1p(Math.abs(val)) / logMax);
            var px = Math.max(0.5, frac * (bH - 12));
            var isRoot = li === depth - 1;
            var isHighlight = isRoot && k === n;
            var col = isHighlight ? CR : color;

            var r = g.append('rect')
              .attr('x', bx + 1).attr('width', bW - 2).attr('rx', 2)
              .attr('y', nodePad/2 + (bH - 12) - px).attr('height', px)
              .attr('fill', col).attr('opacity', 0.7);
            rects.push(r);

            var t = g.append('text')
              .attr('x', bx + bW/2).attr('y', nodePad/2 + (bH - 12) - px - 3)
              .attr('text-anchor', 'middle')
              .style('font-size', '8px').style('fill', col)
              .style('font-family', "'EB Garamond', serif")
              .text(fmtVal(val));
            texts.push(t);
          }

          nd['_barXs_' + mode] = [];
          for (var k = 0; k < nCoeffs; k++)
            nd['_barXs_' + mode].push(gx + nodePad/2 + k * (bW + bGap));

          nodeRefs.push({ rects: rects, texts: texts, nCoeffs: nCoeffs });
        });
      }

      // Sliders (only on forward panel)
      var sliderFills = [], sliderLabels = [];
      if (mode === 'fwd') {
        levels[0].forEach(function(nd, idx) {
          if (nd.pad) return;
          (function(idx) {
            var barXs = nd['_barXs_fwd'];
            var barIdx = Math.min(1, barXs.length - 1);
            var barX = barXs[barIdx];
            var sliderTop = topPad;

            var sg = svg.append('g');
            var frac = Math.min(w[idx] / WMAX, 1);
            var sf = sg.append('rect')
              .attr('x', barX + 2).attr('width', bW - 4).attr('rx', 1)
              .attr('y', sliderTop + sliderH - frac * sliderH).attr('height', frac * sliderH)
              .attr('fill', CI).attr('opacity', 0.8).style('pointer-events', 'none');
            sliderFills.push(sf);

            var sl = sg.append('text')
              .attr('x', barX + bW/2).attr('y', sliderTop + sliderH - frac * sliderH - 2)
              .attr('text-anchor', 'middle')
              .style('font-size', '9px').style('fill', CI).style('pointer-events', 'none')
              .text(w[idx].toFixed(2));
            sliderLabels.push(sl);

            addMathLabel(panel, barX + bW/2, sliderTop + sliderH - 6,
              '$w_{' + (idx+1) + '}$', {anchor:'middle', color:CI, fontSize:'13px'});

            // Drag area
            sg.append('rect')
              .attr('x', barX - 4).attr('y', sliderTop - 2)
              .attr('width', bW + 8).attr('height', sliderH + 4)
              .attr('fill', 'transparent').attr('cursor', 'ns-resize')
              .style('touch-action', 'none')
              .call(d3.drag().on('drag', function(event) {
                var fr = (sliderTop + sliderH - event.y) / sliderH;
                w[idx] = Math.max(0.01, Math.min(WMAX, fr * WMAX));
                build();
              }));

            // Arrow from slider to leaf
            svg.append('line')
              .attr('x1', barX + bW/2).attr('y1', inputZoneBot)
              .attr('x2', barX + bW/2).attr('y2', nd.y)
              .attr('stroke', '#ccc').attr('stroke-width', 1)
              .attr('marker-end', 'url(#fwdArrow)');
          })(idx);
        });
      }

      // Seed annotation (only on adjoint panel)
      if (mode === 'adj') {
        var rootNd = levels[depth - 1][0];
        var barXs = rootNd['_barXs_adj'];
        if (barXs && n < barXs.length) {
          addMathLabel(panel, barXs[n] + bW/2, rootNd.y - 14,
            '$\\bar{c}_n = 1/Z$', {anchor:'middle', color:CR, fontSize:'10px'});
        }
      }

      // Pi output at the TOP of the adjoint panel (mirrors weight sliders)
      var piBars = [], piLabels = [];
      if (mode === 'adj') {
        var pi = [];
        for (var i = 0; i < N; i++) {
          var leaf = levels[0][i];
          pi.push(leaf.adj && leaf.adj.length > 1 ? w[i] * leaf.adj[1] : 0);
        }
        levels[0].forEach(function(nd, idx) {
          if (nd.pad) return;
          var barXs = nd['_barXs_adj'];
          if (!barXs) return;
          var barIdx = Math.min(1, barXs.length - 1);
          var bx = barXs[barIdx];
          var piFrac = Math.min(pi[idx], 1);
          var piTop = topPad;

          var pb = svg.append('rect')
            .attr('x', bx + 2).attr('width', bW - 4).attr('rx', 2)
            .attr('y', piTop + sliderH - piFrac * sliderH).attr('height', piFrac * sliderH)
            .attr('fill', CR).attr('opacity', 0.7);
          piBars.push(pb);

          svg.append('text')
            .attr('x', bx + bW/2).attr('y', piTop + sliderH - piFrac * sliderH - 2)
            .attr('text-anchor', 'middle')
            .style('font-size', '9px').style('fill', CR)
            .style('font-family', "'EB Garamond', serif")
            .text(pi[idx].toFixed(3));

          // Arrow from leaf up to pi bar
          svg.append('line')
            .attr('x1', bx + bW/2).attr('y1', nd.y)
            .attr('x2', bx + bW/2).attr('y2', inputZoneBot)
            .attr('stroke', '#d4a0a0').attr('stroke-width', 1);

          addMathLabel(panel, bx + bW/2, piTop + sliderH - 6,
            '$\\pip_{' + (idx+1) + '}$', {anchor:'middle', color:CR, fontSize:'13px'});
        });
      }

      // Degree labels at root
      var rootNd = levels[depth - 1][0];
      var barXs = rootNd['_barXs_' + mode];
      if (barXs) {
        var nCoeffs = Math.min((mode === 'fwd' ? rootNd.poly : rootNd.adj || []).length, n + 1);
        for (var k = 0; k < nCoeffs; k++) {
          addMathLabel(panel, barXs[k] + bW/2, rootNd.y + nodeH + 2,
            k === n ? '$\\mathbf{' + k + '}$' : '$' + k + '$',
            {anchor:'middle', color: k === n ? CR : '#bbb', fontSize:'9px'});
        }
      }

      return { nodeRefs: nodeRefs, sliderFills: sliderFills, sliderLabels: sliderLabels };
    }

    fwdState = renderPanel(wrap, 'fwd', 'Forward Pass', CW);
    adjState = renderPanel(wrap, 'adj', 'Backward Pass (Adjoints)', CA);

    setTimeout(function() {
      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise([document.getElementById('bp')]);
      }
    }, 50);
  }

  build();
})();
</script>
</div>

</body>
</html>
