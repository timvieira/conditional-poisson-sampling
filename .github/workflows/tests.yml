name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        pip install -e ".[dev]"

    - name: Run identity tests
      run: python tests/test_identities.py

    - name: Run unit tests
      run: python -m pytest tests/test_conditional_poisson.py tests/test_all_implementations.py tests/test_torch.py -v

    - name: Run R agreement tests (skip if R unavailable)
      run: python -m pytest tests/test_r_agreement.py -v || true
