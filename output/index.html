  <script>
    window._activeTags = new Set();

    function filterByTag(tag) {
      var tags = window._activeTags;
      if (tags.has(tag)) {
        tags.delete(tag);
      } else {
        tags.add(tag);
      }

      // Step 1: Update tag highlights immediately
      var noFilter = tags.size === 0;
      document.querySelectorAll('.tag').forEach(function(el) {
        el.classList.toggle('active', tags.has(el.textContent.trim()));
      });

      // Step 2: After tags visually update, start fading articles
      setTimeout(function() {
        var archives = document.getElementById('blog-archives');
        var articles = archives.querySelectorAll('article');
        var headers = archives.querySelectorAll('h2');

        // Determine which articles match
        var toHide = [];
        var toShow = [];
        articles.forEach(function(a) {
          var aTags = a.getAttribute('data-tags').split(',');
          var match = noFilter || Array.from(tags).every(function(t) { return aTags.indexOf(t) >= 0; });
          if (!match && !a.classList.contains('hidden')) {
            toHide.push(a);
          } else if (match && a.classList.contains('hidden')) {
            toShow.push(a);
          }
        });

        // Fade out items that should hide
        toHide.forEach(function(a) { a.classList.add('fading'); });

        // After fade completes, collapse hidden and reveal new ones
        setTimeout(function() {
          toHide.forEach(function(a) {
            a.classList.add('hidden');
            a.classList.remove('fading');
          });

          // Show items that should appear (start faded, then fade in)
          toShow.forEach(function(a) {
            a.classList.add('fading');
            a.classList.remove('hidden');
          });
          // Force reflow before removing fading class
          if (toShow.length) archives.offsetHeight;
          requestAnimationFrame(function() {
            toShow.forEach(function(a) { a.classList.remove('fading'); });
          });

          // Update year headers
          headers.forEach(function(h) {
            var next = h.nextElementSibling;
            var hasVisible = false;
            while (next && next.tagName !== 'H2') {
              if (next.tagName === 'ARTICLE' && !next.classList.contains('hidden')) hasVisible = true;
              next = next.nextElementSibling;
            }
            h.classList.toggle('hidden', !hasVisible);
          });

          // Disable tags that would yield no results if added
          var availableTags = new Set();
          articles.forEach(function(a) {
            if (!a.classList.contains('hidden')) {
              a.getAttribute('data-tags').split(',').forEach(function(t) { availableTags.add(t); });
            }
          });
          if (noFilter) {
            document.querySelectorAll('.tag').forEach(function(el) { el.classList.remove('disabled'); });
          } else {
            tags.forEach(function(t) { availableTags.add(t); });
            document.querySelectorAll('.tag').forEach(function(el) {
              el.classList.toggle('disabled', !availableTags.has(el.textContent.trim()));
            });
          }
        }, 250);

        // Update URL hash
        if (tags.size > 0) {
          history.replaceState(null, '', '#tags=' + Array.from(tags).map(encodeURIComponent).join(','));
        } else {
          history.replaceState(null, '', location.pathname);
        }
      }, 150);
    }

    // Apply filter from URL hash on load (no animation)
    (function() {
      var m = location.hash.match(/tags?=([^&]+)/);
      if (m) {
        m[1].split(',').forEach(function(t) { window._activeTags.add(decodeURIComponent(t)); });
        var tags = window._activeTags;
        var archives = document.getElementById('blog-archives');
        var articles = archives.querySelectorAll('article');
        var headers = archives.querySelectorAll('h2');
        document.querySelectorAll('.tag').forEach(function(el) {
          el.classList.toggle('active', tags.has(el.textContent.trim()));
        });
        articles.forEach(function(a) {
          var aTags = a.getAttribute('data-tags').split(',');
          var match = Array.from(tags).every(function(t) { return aTags.indexOf(t) >= 0; });
          if (!match) a.classList.add('hidden');
        });
        headers.forEach(function(h) {
          var next = h.nextElementSibling;
          var hasVisible = false;
          while (next && next.tagName !== 'H2') {
            if (next.tagName === 'ARTICLE' && !next.classList.contains('hidden')) hasVisible = true;
            next = next.nextElementSibling;
          }
          if (!hasVisible) h.classList.add('hidden');
        });
        var availableTags = new Set();
        articles.forEach(function(a) {
          if (!a.classList.contains('hidden')) {
            a.getAttribute('data-tags').split(',').forEach(function(t) { availableTags.add(t); });
          }
        });
        tags.forEach(function(t) { availableTags.add(t); });
        document.querySelectorAll('.tag').forEach(function(el) {
          el.classList.toggle('disabled', !availableTags.has(el.textContent.trim()));
        });
      }
    })();
  </script>
