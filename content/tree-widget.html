<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
<script>
MathJax = {
  tex: {inlineMath: [['$','$']]},
  startup: {
    ready: function() {
      MathJax.startup.defaultReady();
      // Re-typeset after MathJax is fully loaded
      var tw = document.getElementById('tw');
      if (tw) MathJax.typesetPromise([tw]);
    }
  }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<style>
body {
  font-family: 'EB Garamond', "PT Serif", Georgia, serif;
  color: #333; font-size: 16pt;
  max-width: 800px; margin: 2em auto; padding: 0 1em;
}
svg text { font-family: 'EB Garamond', serif; }
#tw-controls {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 8px; font-size: 0.9em;
}
#tw-controls input[type=number] {
  width: 44px; padding: 2px 4px;
  font-family: inherit; font-size: inherit;
  border: 1px solid #ccc; border-radius: 3px;
}
#tw-status { font-size: 0.75em; color: #999; margin-top: 4px; }
</style>
</head>
<body>
<div id="tw"></div>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(function() {
  var N = 4, n = 2;
  var w = [0.2, 0.35, 0.15, 0.3];
  function normW() { var s=w.reduce(function(a,b){return a+b;},0); w=w.map(function(v){return v/s;}); }
  normW();

  var CW = '#5b9bd5', CR = '#c0504d';
  var root = d3.select('#tw');

  function polyMul(a, b) {
    var out = new Array(a.length + b.length - 1).fill(0);
    for (var i = 0; i < a.length; i++)
      for (var j = 0; j < b.length; j++)
        out[i+j] += a[i] * b[j];
    return out;
  }

  function buildTree(w, n) {
    var leaves = w.map(function(wi, i) {
      return { poly: [1, wi], items: [i], leaf: true };
    });
    var size = 1;
    while (size < leaves.length) size *= 2;
    while (leaves.length < size)
      leaves.push({ poly: [1], items: [], leaf: true, pad: true });
    var level = leaves;
    var allLevels = [level];
    while (level.length > 1) {
      var next = [];
      for (var i = 0; i < level.length; i += 2) {
        var l = level[i], r = level[i+1];
        var p = polyMul(l.poly, r.poly);
        if (p.length > n + 1) p = p.slice(0, n + 1);
        next.push({ left: l, right: r, poly: p, items: l.items.concat(r.items), leaf: false });
      }
      level = next;
      allLevels.push(level);
    }
    return { root: level[0], levels: allLevels };
  }

  // Each histogram bar width
  var cW = 12;
  var histH = 24;
  var sliderH = 50;
  var vGap = 28;
  var hGap = 14;

  var sliderFills = [], sliderLabels = [];
  var nodeRefs = [];

  // Helper: embed MathJax-rendered HTML inside SVG via foreignObject
  function svgMath(parent, x, y, html, opts) {
    opts = opts || {};
    var w = opts.width || 80, h = opts.height || 20;
    var fo = parent.append('foreignObject')
      .attr('x', x - (opts.anchor === 'middle' ? w/2 : opts.anchor === 'end' ? w : 0))
      .attr('y', y - h/2)
      .attr('width', w).attr('height', h);
    var div = fo.append('xhtml:div')
      .style('font-size', opts.fontSize || '10px')
      .style('color', opts.color || '#999')
      .style('text-align', opts.anchor === 'middle' ? 'center' : opts.anchor === 'end' ? 'right' : 'left')
      .style('line-height', h + 'px')
      .html(html);
    return fo;
  }

  function build() {
    root.selectAll('*').remove();
    sliderFills = []; sliderLabels = [];
    nodeRefs = [];

    // Controls
    var ctrl = root.append('div').attr('id', 'tw-controls');
    ctrl.append('span').html('$N$ = ');
    ctrl.append('input').attr('type','number').attr('min',2).attr('max',8).attr('value',N)
      .on('change input', function() {
        var v = Math.max(2, Math.min(8, Math.round(+this.value)));
        if (v === N) return;
        N = v; n = Math.min(n, N);
        while (w.length < N) w.push(0.2);
        w = w.slice(0, N); normW(); build();
      });
    ctrl.append('span').html('&ensp;$n$ = ');
    ctrl.append('input').attr('type','number').attr('min',0).attr('max',N).attr('value',n)
      .on('change input', function() {
        var v = Math.max(0, Math.min(N, Math.round(+this.value)));
        if (v === n) return;
        n = v; build();
      });

    var tree = buildTree(w, n);
    var levels = tree.levels;
    var depth = levels.length;

    // Layout: leaves at top, root at bottom
    // Compute each node's box width
    var nodePad = 8; // padding inside group box
    function nodeBoxW(nd) {
      if (nd.pad) return 0;
      var nc = Math.min(nd.poly.length, n + 1);
      return nc * cW + nodePad;
    }

    // Compute min spacing for each level (widest node + gap)
    var levelSpacings = levels.map(function(lev) {
      var maxW = 0;
      lev.forEach(function(nd) { var bw = nodeBoxW(nd); if (bw > maxW) maxW = bw; });
      return maxW + hGap + 4;
    });
    // Leaf spacing must also fit sliders
    levelSpacings[0] = Math.max(levelSpacings[0], cW + hGap + 20);

    // Find the widest level to set SVG width
    var maxLevelW = 0;
    for (var li = 0; li < levels.length; li++) {
      var lw = levels[li].length * levelSpacings[li];
      if (lw > maxLevelW) maxLevelW = lw;
    }
    var svgW = Math.max(300, maxLevelW + 40);

    var labelH = 16;
    var topPad = 10;
    var leafY = topPad + labelH + sliderH + 4;
    var svgH = leafY + depth * (histH + vGap) + 30;

    var svg = root.append('svg').attr('width', svgW).attr('height', svgH)
      .style('display', 'block').style('margin', '0 auto').style('user-select', 'none');

    // Assign x: leaves evenly spaced, internal nodes at midpoint of children
    // First spread leaves
    var leafCount = levels[0].length;
    var leafSpacing = Math.max(levelSpacings[0], (svgW - 40) / leafCount);
    var leafStartX = (svgW - leafCount * leafSpacing) / 2;
    for (var ni = 0; ni < leafCount; ni++) {
      levels[0][ni].x = leafStartX + ni * leafSpacing + leafSpacing / 2;
      levels[0][ni].y = leafY;
    }
    // Internal levels: x = midpoint of children
    for (var li = 1; li < levels.length; li++) {
      levels[li].forEach(function(nd) {
        if (nd.left && nd.right) {
          nd.x = (nd.left.x + nd.right.x) / 2;
        } else if (nd.left) {
          nd.x = nd.left.x;
        }
        nd.y = leafY + li * (histH + vGap);
      });
    }

    // --- Draw edges ---
    for (var li = 1; li < levels.length; li++) {
      levels[li].forEach(function(nd) {
        [nd.left, nd.right].forEach(function(child) {
          if (!child || child.pad) return;
          var x1 = child.x, y1 = child.y + histH;
          var x2 = nd.x, y2 = nd.y;
          var my = (y1 + y2) / 2;
          svg.append('path')
            .attr('d', 'M'+x1+','+y1+' C'+x1+','+my+' '+x2+','+my+' '+x2+','+y2)
            .attr('fill', 'none').attr('stroke', '#ddd').attr('stroke-width', 1.2);
        });
      });
    }

    // --- Draw histograms for all nodes ---
    // Find global max coefficient for consistent scaling
    var globalMax = 0;
    (function walk(nd) {
      if (!nd || nd.pad) return;
      nd.poly.forEach(function(c) { if (Math.abs(c) > globalMax) globalMax = Math.abs(c); });
      if (nd.left) walk(nd.left);
      if (nd.right) walk(nd.right);
    })(tree.root);
    if (globalMax === 0) globalMax = 1;

    for (var li = 0; li < levels.length; li++) {
      levels[li].forEach(function(nd) {
        if (nd.pad) { nodeRefs.push(null); return; }
        var coeffs = nd.poly;
        var nCoeffs = Math.min(coeffs.length, n + 1);
        var boxW = nCoeffs * cW + nodePad;
        var gx = nd.x - boxW/2;
        var g = svg.append('g')
          .attr('transform', 'translate(' + gx + ',' + nd.y + ')');

        // Subtle group background
        g.append('rect').attr('width', boxW).attr('height', histH)
          .attr('fill', '#fafafa').attr('stroke', '#e8e8e8').attr('rx', 3).attr('stroke-width', 0.5);

        var cRects = [], cTexts = [];
        for (var k = 0; k < nCoeffs; k++) {
          var bx = nodePad/2 + k * cW;
          var barFrac = Math.min(1, Math.abs(coeffs[k]) / globalMax);
          var barPx = Math.max(0.5, barFrac * (histH - 2));
          var isHighlight = (li === levels.length - 1 && k === n);
          // Just the fill bar, no track
          var cr = g.append('rect')
            .attr('x', bx + 1).attr('y', histH - 1 - barPx)
            .attr('width', cW - 2).attr('height', barPx)
            .attr('fill', isHighlight ? CR : CW).attr('opacity', 0.75).attr('rx', 1);
          cRects.push(cr);
          cTexts.push(null); // no text labels inside the tree—too cluttered
        }

        // At root: add index labels below
        if (li === levels.length - 1) {
          for (var k = 0; k < nCoeffs; k++) {
            var labelX = gx + nodePad/2 + k * cW + cW/2;
            svgMath(svg, labelX, nd.y + histH + 6,
              k === n ? '$\\mathbf{' + k + '}$' : '$' + k + '$',
              {anchor:'middle', color: k === n ? CR : '#bbb', fontSize:'8px', width:20, height:14});
          }
        }

        // Store x positions for slider alignment
        nd._barXs = [];
        for (var k = 0; k < nCoeffs; k++) {
          nd._barXs.push(gx + nodePad/2 + k * cW);
        }

        nodeRefs.push({ cellRects: cRects, cellTexts: cTexts, nCoeffs: nCoeffs });
      });
    }

    // --- Sliders above leaves, aligned to the w_i bar (index 1) ---
    levels[0].forEach(function(nd, idx) {
      if (nd.pad) return;
      (function(idx) {
        // The w_i bar is at index 1 in the leaf histogram [1, w_i]
        var barX = nd._barXs[1]; // left edge of the w_i coefficient bar
        var sliderTop = topPad + labelH;

        // Track (same width as one histogram bar)
        svg.append('rect')
          .attr('x', barX + 1).attr('y', sliderTop)
          .attr('width', cW - 2).attr('height', sliderH)
          .attr('fill', '#f8f8f8').attr('stroke', '#eee').attr('rx', 1);

        // Fill
        var frac = Math.min(w[idx], 1);
        var sf = svg.append('rect')
          .attr('x', barX + 2).attr('width', cW - 4).attr('rx', 1)
          .attr('y', sliderTop + sliderH - frac * sliderH).attr('height', frac * sliderH)
          .attr('fill', CW).attr('opacity', 0.8).style('pointer-events', 'none');
        sliderFills.push(sf);

        // Label
        var sl = svg.append('text')
          .attr('x', barX + cW/2).attr('y', sliderTop + sliderH - frac * sliderH - 2)
          .attr('text-anchor', 'middle')
          .style('font-size', '9px').style('fill', CW).style('pointer-events', 'none')
          .text(w[idx].toFixed(2));
        sliderLabels.push(sl);

        // Item label above slider (MathJax)
        svgMath(svg, barX + cW/2, topPad + 4, '$w_' + (idx+1) + '$', {anchor:'middle', color:CW, fontSize:'11px', width:30, height:18});

        // Drag target (wider for touch)
        svg.append('rect')
          .attr('x', barX - 4).attr('y', sliderTop - 2)
          .attr('width', cW + 8).attr('height', sliderH + 4)
          .attr('fill', 'transparent').attr('cursor', 'ns-resize')
          .style('touch-action', 'none')
          .call(d3.drag().on('drag', function(event) {
            var frac = (sliderTop + sliderH - event.y) / sliderH;
            var target = Math.max(0.01, Math.min(0.99, frac));
            var others = 0;
            for (var k = 0; k < N; k++) if (k !== idx) others += w[k];
            var remain = 1 - target;
            if (others > 1e-10 && remain > 0) {
              var scale = remain / others;
              for (var k = 0; k < N; k++) {
                if (k === idx) w[k] = target;
                else w[k] = Math.max(0.001, w[k] * scale);
              }
            }
            normW();
            updateTree();
          }));
      })(idx);
    });

    // Z label beside root (updated dynamically via foreignObject)
    var rootNd = levels[levels.length - 1][0];
    var rootBoxW = Math.min(rootNd.poly.length, n+1) * cW;
    var zLabelFO = svg.append('foreignObject')
      .attr('x', rootNd.x + rootBoxW/2 + 6).attr('y', rootNd.y + histH/2 - 10)
      .attr('width', 120).attr('height', 22);
    var zLabelDiv = zLabelFO.append('xhtml:div')
      .style('font-size', '11px').style('color', CR).style('line-height', '22px');

    root.datum({ levels: levels, tree: tree, globalMax: globalMax });
    updateTree();
    // MathJax: must clear then re-typeset the entire widget container
    // so new foreignObject elements get processed
    if (window.MathJax && MathJax.typesetPromise) {
      var container = document.getElementById('tw');
      MathJax.typesetClear([container]);
      MathJax.typesetPromise([container]);
    }
  }

  function fmtCoeff(v) {
    if (v === 0) return '0';
    if (v < 0.005 && v > 0) return '';
    if (v >= 10) return v.toFixed(0);
    if (v >= 1) return v.toFixed(1);
    return v.toFixed(2);
  }

  function updateTree() {
    var data = root.datum();
    var levels = data.levels;
    var sliderTop = 10 + 16; // topPad + labelH

    // Update sliders
    for (var i = 0; i < N; i++) {
      var frac = Math.min(w[i], 1);
      sliderFills[i].attr('y', sliderTop + sliderH - frac * sliderH).attr('height', frac * sliderH);
      sliderLabels[i].attr('y', sliderTop + sliderH - frac * sliderH - 2).text(w[i].toFixed(2));
    }

    // Rebuild tree data
    var newTree = buildTree(w, n);
    var newLevels = newTree.levels;

    // Recompute global max
    var gMax = 0;
    (function walk(nd) {
      if (!nd || nd.pad) return;
      nd.poly.forEach(function(c) { if (Math.abs(c) > gMax) gMax = Math.abs(c); });
      if (nd.left) walk(nd.left);
      if (nd.right) walk(nd.right);
    })(newTree.root);
    if (gMax === 0) gMax = 1;

    // Update histograms
    var ri = 0;
    for (var li = 0; li < newLevels.length; li++) {
      for (var ni = 0; ni < newLevels[li].length; ni++) {
        var ref = nodeRefs[ri++];
        if (!ref) continue;
        var coeffs = newLevels[li][ni].poly;
        var nCoeffs = ref.nCoeffs;
        for (var k = 0; k < nCoeffs; k++) {
          var barFrac = Math.min(1, Math.abs(coeffs[k]) / gMax);
          var barPx = Math.max(1, barFrac * (histH - 4));
          ref.cellRects[k].attr('y', histH - 1 - barPx).attr('height', barPx);
        }
      }
    }

    var Z = newTree.root.poly[Math.min(n, newTree.root.poly.length - 1)];
    zLabelDiv.html('$\\leftarrow Z = ' + (Z !== undefined ? Z.toFixed(4) : '\\text{—}') + '$');
    if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([zLabelDiv.node()]);
  }

  build();
})();
</script>
</body>
</html>
