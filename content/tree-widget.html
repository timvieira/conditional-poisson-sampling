<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
<script>MathJax={tex:{inlineMath:[['$','$']]}}</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<style>
body {
  font-family: 'EB Garamond', "PT Serif", Georgia, serif;
  color: #333; font-size: 16pt;
  max-width: 800px; margin: 2em auto; padding: 0 1em;
}
svg text { font-family: 'EB Garamond', serif; }
#tw-controls {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 8px; font-size: 0.9em;
}
#tw-controls input[type=number] {
  width: 44px; padding: 2px 4px;
  font-family: inherit; font-size: inherit;
  border: 1px solid #ccc; border-radius: 3px;
}
#tw-status { font-size: 0.75em; color: #999; margin-top: 4px; }
</style>
</head>
<body>
<div id="tw"></div>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(function() {
  var N = 4, n = 2;
  var w = [0.2, 0.35, 0.15, 0.3];
  function normW() { var s=w.reduce(function(a,b){return a+b;},0); w=w.map(function(v){return v/s;}); }
  normW();

  var CW = '#5b9bd5', CR = '#c0504d';
  var root = d3.select('#tw');

  function polyMul(a, b) {
    var out = new Array(a.length + b.length - 1).fill(0);
    for (var i = 0; i < a.length; i++)
      for (var j = 0; j < b.length; j++)
        out[i+j] += a[i] * b[j];
    return out;
  }

  function buildTree(w, n) {
    var leaves = w.map(function(wi, i) {
      return { poly: [1, wi], items: [i], leaf: true };
    });
    var size = 1;
    while (size < leaves.length) size *= 2;
    while (leaves.length < size)
      leaves.push({ poly: [1], items: [], leaf: true, pad: true });
    var level = leaves;
    var allLevels = [level];
    while (level.length > 1) {
      var next = [];
      for (var i = 0; i < level.length; i += 2) {
        var l = level[i], r = level[i+1];
        var p = polyMul(l.poly, r.poly);
        if (p.length > n + 1) p = p.slice(0, n + 1);
        next.push({ left: l, right: r, poly: p, items: l.items.concat(r.items), leaf: false });
      }
      level = next;
      allLevels.push(level);
    }
    return { root: level[0], levels: allLevels };
  }

  // Each histogram bar width
  var cW = 14;
  // Histogram max height (for internal nodes)
  var histH = 36;
  // Slider height (for leaves)
  var sliderH = 60;
  var vGap = 32;
  var hGap = 10;

  var sliderFills = [], sliderLabels = [];
  var nodeRefs = [];
  var statusEl;

  function build() {
    root.selectAll('*').remove();
    sliderFills = []; sliderLabels = [];
    nodeRefs = [];

    // Controls
    var ctrl = root.append('div').attr('id', 'tw-controls');
    ctrl.append('span').html('$N$ = ');
    ctrl.append('input').attr('type','number').attr('min',2).attr('max',8).attr('value',N)
      .on('change input', function() {
        var v = Math.max(2, Math.min(8, Math.round(+this.value)));
        if (v === N) return;
        N = v; n = Math.min(n, N);
        while (w.length < N) w.push(0.2);
        w = w.slice(0, N); normW(); build();
      });
    ctrl.append('span').html('&ensp;$n$ = ');
    ctrl.append('input').attr('type','number').attr('min',0).attr('max',N).attr('value',n)
      .on('change input', function() {
        var v = Math.max(0, Math.min(N, Math.round(+this.value)));
        if (v === n) return;
        n = v; build();
      });

    var tree = buildTree(w, n);
    var levels = tree.levels;
    var depth = levels.length;

    // Layout: leaves at top, root at bottom
    // Leaf node width = 2 bars (coeffs [1, w_i])
    // Internal node width = nCoeffs bars
    var leafSpacing = 2 * cW + hGap + 12;
    var leafCount = levels[0].length;
    var svgW = Math.max(300, leafCount * leafSpacing + 40);

    // Vertical: item labels + sliders + leaf nodes + internal levels
    var labelH = 16;
    var topPad = 10;
    var leafY = topPad + labelH + sliderH + 4;
    var svgH = leafY + depth * (histH + vGap) + 30;

    var svg = root.append('svg').attr('width', svgW).attr('height', svgH)
      .style('display', 'block').style('margin', '0 auto').style('user-select', 'none');

    // Assign x positions based on leaf spacing
    for (var li = 0; li < levels.length; li++) {
      var lev = levels[li];
      var totalW = lev.length * leafSpacing;
      var startX = (svgW - totalW) / 2;
      for (var ni = 0; ni < lev.length; ni++) {
        lev[ni].x = startX + ni * leafSpacing + leafSpacing / 2;
        lev[ni].y = leafY + li * (histH + vGap);
      }
    }

    // --- Draw edges ---
    for (var li = 1; li < levels.length; li++) {
      levels[li].forEach(function(nd) {
        [nd.left, nd.right].forEach(function(child) {
          if (!child || child.pad) return;
          var x1 = child.x, y1 = child.y + histH;
          var x2 = nd.x, y2 = nd.y;
          var my = (y1 + y2) / 2;
          svg.append('path')
            .attr('d', 'M'+x1+','+y1+' C'+x1+','+my+' '+x2+','+my+' '+x2+','+y2)
            .attr('fill', 'none').attr('stroke', '#ddd').attr('stroke-width', 1.2);
        });
      });
    }

    // --- Draw histograms for all nodes ---
    // Find global max coefficient for consistent scaling
    var globalMax = 0;
    (function walk(nd) {
      if (!nd || nd.pad) return;
      nd.poly.forEach(function(c) { if (Math.abs(c) > globalMax) globalMax = Math.abs(c); });
      if (nd.left) walk(nd.left);
      if (nd.right) walk(nd.right);
    })(tree.root);
    if (globalMax === 0) globalMax = 1;

    for (var li = 0; li < levels.length; li++) {
      levels[li].forEach(function(nd) {
        if (nd.pad) { nodeRefs.push(null); return; }
        var coeffs = nd.poly;
        var nCoeffs = Math.min(coeffs.length, n + 1);
        var boxW = nCoeffs * cW;
        var g = svg.append('g')
          .attr('transform', 'translate(' + (nd.x - boxW/2) + ',' + nd.y + ')');

        // Baseline
        g.append('line').attr('x1', 0).attr('x2', boxW)
          .attr('y1', histH).attr('y2', histH)
          .attr('stroke', '#e0e0e0').attr('stroke-width', 0.5);

        var cRects = [], cTexts = [];
        for (var k = 0; k < nCoeffs; k++) {
          var barH = Math.max(1, (Math.abs(coeffs[k]) / globalMax) * histH);
          var cr = g.append('rect')
            .attr('x', k * cW + 1).attr('y', histH - barH)
            .attr('width', cW - 2).attr('height', barH)
            .attr('fill', CW).attr('opacity', 0.7).attr('rx', 1);
          cRects.push(cr);
          if (N <= 6) {
            var ct = g.append('text')
              .attr('x', k * cW + cW/2).attr('y', histH - barH - 2)
              .attr('text-anchor', 'middle')
              .style('font-size', '7px').style('fill', '#999')
              .text(fmtCoeff(coeffs[k]));
            cTexts.push(ct);
          }
        }

        // At root: highlight n-th bar + add index labels below
        if (li === levels.length - 1) {
          if (n < nCoeffs) {
            var hBarH = Math.max(1, (Math.abs(coeffs[n]) / globalMax) * histH);
            g.append('rect')
              .attr('x', n * cW).attr('y', histH - hBarH - 1)
              .attr('width', cW).attr('height', hBarH + 2)
              .attr('fill', 'none').attr('stroke', CR).attr('stroke-width', 1.5).attr('rx', 1);
          }
          for (var k = 0; k < nCoeffs; k++) {
            g.append('text')
              .attr('x', k * cW + cW/2).attr('y', histH + 10)
              .attr('text-anchor', 'middle')
              .style('font-size', '7px').style('fill', k === n ? CR : '#bbb')
              .text(k);
          }
        }

        // Store x position of each coefficient bar for slider alignment
        nd._barXs = [];
        for (var k = 0; k < nCoeffs; k++) {
          nd._barXs.push(nd.x - boxW/2 + k * cW);
        }

        nodeRefs.push({ cellRects: cRects, cellTexts: cTexts, nCoeffs: nCoeffs });
      });
    }

    // --- Sliders above leaves, aligned to the w_i bar (index 1) ---
    levels[0].forEach(function(nd, idx) {
      if (nd.pad) return;
      (function(idx) {
        // The w_i bar is at index 1 in the leaf histogram [1, w_i]
        var barX = nd._barXs[1]; // left edge of the w_i coefficient bar
        var sliderTop = topPad + labelH;

        // Track (same width as one histogram bar)
        svg.append('rect')
          .attr('x', barX + 1).attr('y', sliderTop)
          .attr('width', cW - 2).attr('height', sliderH)
          .attr('fill', '#f8f8f8').attr('stroke', '#eee').attr('rx', 1);

        // Fill
        var frac = Math.min(w[idx], 1);
        var sf = svg.append('rect')
          .attr('x', barX + 2).attr('width', cW - 4).attr('rx', 1)
          .attr('y', sliderTop + sliderH - frac * sliderH).attr('height', frac * sliderH)
          .attr('fill', CW).attr('opacity', 0.8).style('pointer-events', 'none');
        sliderFills.push(sf);

        // Label
        var sl = svg.append('text')
          .attr('x', barX + cW/2).attr('y', sliderTop + sliderH - frac * sliderH - 2)
          .attr('text-anchor', 'middle')
          .style('font-size', '9px').style('fill', CW).style('pointer-events', 'none')
          .text(w[idx].toFixed(2));
        sliderLabels.push(sl);

        // Item label above slider
        svg.append('text')
          .attr('x', barX + cW/2).attr('y', topPad + labelH - 4)
          .attr('text-anchor', 'middle')
          .style('font-size', '9px').style('fill', '#999')
          .text('w' + (idx+1));

        // Drag target (wider for touch)
        svg.append('rect')
          .attr('x', barX - 4).attr('y', sliderTop - 2)
          .attr('width', cW + 8).attr('height', sliderH + 4)
          .attr('fill', 'transparent').attr('cursor', 'ns-resize')
          .style('touch-action', 'none')
          .call(d3.drag().on('drag', function(event) {
            var frac = (sliderTop + sliderH - event.y) / sliderH;
            var target = Math.max(0.01, Math.min(0.99, frac));
            var others = 0;
            for (var k = 0; k < N; k++) if (k !== idx) others += w[k];
            var remain = 1 - target;
            if (others > 1e-10 && remain > 0) {
              var scale = remain / others;
              for (var k = 0; k < N; k++) {
                if (k === idx) w[k] = target;
                else w[k] = Math.max(0.001, w[k] * scale);
              }
            }
            normW();
            updateTree();
          }));
      })(idx);
    });

    // Z label beside root (updated dynamically)
    var rootNd = levels[levels.length - 1][0];
    var rootBoxW = Math.min(rootNd.poly.length, n+1) * cW;
    var zLabel = svg.append('text')
      .attr('x', rootNd.x + rootBoxW/2 + 8).attr('y', rootNd.y + histH/2 + 4)
      .attr('text-anchor', 'start')
      .style('font-size', '11px').style('fill', CR);

    root.datum({ levels: levels, tree: tree, globalMax: globalMax });
    updateTree();
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetClear(); MathJax.typesetPromise(); }
  }

  function fmtCoeff(v) {
    if (v === 0) return '0';
    if (v < 0.005 && v > 0) return '';
    if (v >= 10) return v.toFixed(0);
    if (v >= 1) return v.toFixed(1);
    return v.toFixed(2);
  }

  function updateTree() {
    var data = root.datum();
    var levels = data.levels;
    var sliderTop = 10 + 16; // topPad + labelH

    // Update sliders
    for (var i = 0; i < N; i++) {
      var frac = Math.min(w[i], 1);
      sliderFills[i].attr('y', sliderTop + sliderH - frac * sliderH).attr('height', frac * sliderH);
      sliderLabels[i].attr('y', sliderTop + sliderH - frac * sliderH - 2).text(w[i].toFixed(2));
    }

    // Rebuild tree data
    var newTree = buildTree(w, n);
    var newLevels = newTree.levels;

    // Recompute global max
    var gMax = 0;
    (function walk(nd) {
      if (!nd || nd.pad) return;
      nd.poly.forEach(function(c) { if (Math.abs(c) > gMax) gMax = Math.abs(c); });
      if (nd.left) walk(nd.left);
      if (nd.right) walk(nd.right);
    })(newTree.root);
    if (gMax === 0) gMax = 1;

    // Update histograms
    var ri = 0;
    for (var li = 0; li < newLevels.length; li++) {
      for (var ni = 0; ni < newLevels[li].length; ni++) {
        var ref = nodeRefs[ri++];
        if (!ref) continue;
        var coeffs = newLevels[li][ni].poly;
        var nCoeffs = ref.nCoeffs;
        for (var k = 0; k < nCoeffs; k++) {
          var barH = Math.max(1, (Math.abs(coeffs[k]) / gMax) * histH);
          ref.cellRects[k].attr('y', histH - barH).attr('height', barH);
          if (ref.cellTexts[k]) {
            ref.cellTexts[k].attr('y', histH - barH - 2).text(fmtCoeff(coeffs[k]));
          }
        }
      }
    }

    var Z = newTree.root.poly[Math.min(n, newTree.root.poly.length - 1)];
    zLabel.text('← Z = ' + (Z !== undefined ? Z.toFixed(4) : '—'));
  }

  build();
})();
</script>
</body>
</html>
